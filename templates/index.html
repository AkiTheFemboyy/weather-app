<head>
    <title>{{ text.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background: #121212;
            color: white;
            padding: 20px;
        }

        input, button {
            padding: 12px;
            margin: 8px;
            width: 80%;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #ff69b4;
            color: white;
            font-weight: bold;
        }

        .card {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 12px;
            white-space: pre-line;
        }
    </style>

<!DOCTYPE html>
<html>
<head>
    <title>{{ text["title"] }}</title>
</head>

<body>

<h1>{{ text["title"] }}</h1>

<form method="POST">

    <input type="text" name="city" placeholder="{{ text['search'] }}">

    <button type="submit" name="city_btn">
        {{ text["search"] }}
    </button>

    <button type="submit" name="gps_btn" value="1">
        {{ text["gps"] }}
    </button>

    <select name="lang">
        <option value="en" {% if lang == "en" %}selected{% endif %}>English</option>
        <option value="cz" {% if lang == "cz" %}selected{% endif %}>Čeština</option>
    </select>

</form>

<pre>{{ result }}</pre>

</body>
</html>
